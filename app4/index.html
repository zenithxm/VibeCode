    // 1. DICE & EXPRESSION HELPERS
    // ================================
    function evaluateDiceExpr(expr) {
        if (!expr) return 0;
        expr = expr.trim();
        if (expr === "") return 0;
        if (/^[\+\-]\d+$/.test(expr)) return parseInt(expr, 10);
        
        // Handle "d20" as "1d20"
        let diceExpr = expr;
        if (/^d\d+$/i.test(expr)) diceExpr = "1" + expr;
        const dicePattern = /(\d+)d(\d+)/i;
        const match = diceExpr.match(dicePattern);
        if (!match) return isNaN(parseInt(expr,10)) ? 0 : parseInt(expr,10);
        const count = parseInt(match[1], 10);
        const sides = parseInt(match[2], 10);
        let sum = 0;
        for (let i = 0; i < count; i++) sum += Math.floor(Math.random() * sides) + 1;
        const rest = expr.replace(dicePattern, "").trim();
        if (rest.startsWith("+")) sum += parseInt(rest.slice(1), 10);
        else if (rest.startsWith("-")) sum -= parseInt(rest.slice(1), 10);
        else if (rest.startsWith("*")) sum *= parseInt(rest.slice(1), 10);
        if (sum <= 0) sum = 1;
        return sum;
    }

    function evaluateMultiple(exprListStr) {
        if (!exprListStr) return [];
        return exprListStr.split(',').map(s => s.trim()).filter(s => s).map(part => evaluateDiceExpr(part));
    }

    function formatDiceRolls(exprListStr) {
        if (!exprListStr) return "";
        const parts = exprListStr.split(',').map(s => s.trim()).filter(s => s);
        const results = parts.map(part => {
            // Check for DC format: e.g., "1d100dc50"
            const dcMatch = part.match(/^(\d*d\d+)(?:dc(\d+))$/i);
            if (dcMatch) {
                const diceExpr = dcMatch[1];
                const dc = parseInt(dcMatch[2], 10);
                const roll = evaluateDiceExpr(diceExpr);  // numeric value
                const outcome = roll >= dc ? "Success" : "Failed";
                return `${part} → ${roll} ${outcome}`;
            }
            // Normal dice expression (including "1d4*10", "2d6+5", etc.)
            const value = evaluateDiceExpr(part);
            return `${part} → ${value}`;
        });
        return results.join(", ");
    }

    function getDieMax(expr) {
        let diceExpr = expr;
        if (/^d\d+$/i.test(expr)) diceExpr = "1" + expr;
        const dicePattern = /(\d+)d(\d+)/i;
        const match = diceExpr.match(dicePattern);
        if (!match) {
            // If it's just a number or something else, treat as flat value
            const val = parseInt(diceExpr, 10);
            return isNaN(val) ? 0 : val;
        }
        const count = parseInt(match[1], 10);
        const sides = parseInt(match[2], 10);
        return count * sides;
    }

      { "min": 25, "max": 25, "result": "Discarded backpack", "nextTable": null, "note": "You find a discarded backpack with some intriguing contents." },
      { "min": 26, "max": 26, "result": "Odd noise ahead", "nextTable": null, "note": "An odd noise is coming from some distance ahead..." },
      { "min": 27, "max": 27, "result": "Strange lights", "nextTable": null, "note": "Strange lights in the nearby hills are attracting your attention." },
      { "min": 28, "max": 28, "result": "Orchard", "nextTable": null, "note": "You stumble across an orchard, filled with ripe and delicious fruit. The owner is nowhere in sight." },
      { "min": 29, "max": 29, "result": "Bounty hunters", "nextTable": null, "note": "Bounty hunters, searching for a fugitive. “You seen anyone?” (Who they are working for is unclear)" },
      { "min": 30, "max": 30, "result": "Abrupt weather change", "nextTable": "weather_table", "note": "Sudden and abrupt change in weather." },
      { "min": 31, "max": 31, "result": "Abandoned mine", "nextTable": null, "note": "Abandoned mine, dwarven or otherwise." },
      { "min": 32, "max": 32, "result": "Howling distance", "nextTable": null, "note": "You hear howling in the distance. It could be wolves, but the sound is strange somehow..." },
      { "min": 33, "max": 33, "result": "Battle debris", "nextTable": "qa_table", "note": "Debris from a recent, large battle. Who fought here, and who won? How recent was this?" },
      { "min": 34, "max": 34, "result": "Humanoid corpse", "nextTable": "clue_table", "note": "Humanoid corpse. 25% you find a clue (see Clue table in Chapter 9)." },
      { "min": 35, "max": 35, "result": "Talking bird/creature", "nextTable": "creatures_table", "note": "A bird (or some other creature) begins talking to you, in fluent Common! And not just mindless parroting..." },
      { "min": 36, "max": 36, "result": "Noble entourage", "nextTable": null, "note": "A royal/noble personage and their entourage passes in an opulent carriage." },
      { "min": 37, "max": 37, "result": "Circling birds", "nextTable": null, "note": "A flock of birds (vultures? ravens?) circles over a point somewhere overhead." },
      { "min": 38, "max": 38, "result": "Ruined monument", "nextTable": null, "note": "You find an old, ruined monument. Is it to a god, a famous local figure, or something else?" },
      { "min": 39, "max": 39, "result": "Traveller warning", "nextTable": null, "note": "A traveller with information/warning about a situation in the next settlement." },
      { "min": 40, "max": 40, "result": "Unmarked settlement", "nextTable": "unmarked_settlement", "note": "Unmarked settlement: town/village/hamlet. Human?" },
      { "min": 41, "max": 41, "result": "Washed out bridge", "nextTable": null, "note": "You reach a bridge over a small river. The bridge is washed out. Travellers are waiting here, unsure what to do." },
      { "min": 42, "max": 42, "result": "Injured beast", "nextTable": "creatures_table", "note": "You find an injured beast." },
      { "min": 43, "max": 43, "result": "Farmer's meal", "nextTable": null, "note": "A farmer invites you into his house for a meal, and possibly some of his home brew ale/mead as well." },
      { "min": 44, "max": 44, "result": "Broken-down cart", "nextTable": "qa_table", "note": "Overturned/broken-down cart. Is it attended?" },
      { "min": 45, "max": 50, "result": "Monster ambush (Easy)", "nextTable": "monster_generator", "note": "Monster ambush. Level-appropriate easy encounter. Go to Chapter 16." },
      { "min": 51, "max": 51, "result": "Indifferent animal", "nextTable": "creatures_table", "note": "An animal wanders across your path. It glances up at you but doesn’t seem particularly bothered." },
      { "min": 52, "max": 52, "result": "Trapped creature", "nextTable": "qa_table", "note": "Trapped creature (humanoid? monster? What type of trap?)" },
      { "min": 53, "max": 55, "result": "Abandoned structure", "nextTable": "structure_table", "note": "An abandoned/ruined structure of some kind, which may or may not have a subterranean component." },
      { "min": 56, "max": 56, "result": "Old hermit", "nextTable": "a_npc_generator", "note": "An old hermit. What’s he babbling about?" },
      { "min": 57, "max": 57, "result": "Unsettling token", "nextTable": null, "note": "A creepy and unsettling token/sign." },
      { "min": 58, "max": 58, "result": "Traveling merchant", "nextTable": "a_npc_generator", "note": "Traveling merchant." },
      { "min": 59, "max": 59, "result": "Traveling adventurer", "nextTable": "a_adv_generator", "note": "A traveling adventurer who is impressed and wants to join your party." },
      { "min": 60, "max": 65, "result": "Monster Encounter (Medium)", "nextTable": "monster_generator", "note": "Monster Encounter: Level-appropriate medium encounter. Go to Chapter 16." },
      { "min": 66, "max": 66, "result": "Laughing traveller", "nextTable": "a_npc_generator", "note": "A traveller, resting by the side of the road, begins pointing and laughing uproariously at you. Is she mad?" },
      { "min": 67, "max": 67, "result": "Guarded transport", "nextTable": null, "note": "Heavily-guarded transport passes." },
      { "min": 68, "max": 68, "result": "Travelling sage", "nextTable": "a_npc_generator", "note": "Travelling sage/archivist." },
      { "min": 69, "max": 69, "result": "Bandit toll", "nextTable": null, "note": "Bandits (human or otherwise) demand a toll from you." },
      { "min": 70, "max": 75, "result": "Monster Encounter (Hard)", "nextTable": "monster_generator", "note": "Monster: Level appropriate hard encounter." },
      { "min": 76, "max": 76, "result": "Starving family", "nextTable": null, "note": "A starving family begging for food or gold." },
      { "min": 77, "max": 77, "result": "Tribe tribute", "nextTable": null, "note": "A tribe who owns the land demands a tribute from you for passage." },
      { "min": 78, "max": 78, "result": "Travelling troupe", "nextTable": "qa_table", "note": "A travelling troupe of performers (80% Friendly)." },
      { "min": 79, "max": 79, "result": "Illegal merchant", "nextTable": "a_npc_generator", "note": "A travelling merchant with illegal wares. Smuggler? Drug dealer? Heist thief?" },
      { "min": 80, "max": 80, "result": "Camped hunters", "nextTable": null, "note": "Hunters/travellers/adventurers. Camped up and relaxing." },
      { "min": 81, "max": 81, "result": "Carved faces in hill", "nextTable": null, "note": "A low rocky hill, where faces have been carved into the rocks along with beasts. It seems to tell a story." },
      { "min": 82, "max": 82, "result": "Hidden track", "nextTable": null, "note": "You see a track leading away from the road and into the forest/hills. Who knows where it leads..." },
      { "min": 83, "max": 83, "result": "Bandit waylay", "nextTable": null, "note": "Bandits waylay you and demand all your money." },
      { "min": 84, "max": 84, "result": "Lone cabin", "nextTable": "qa_table", "note": "On a lonely stretch of road, you see a lone cabin, but cannot tell if it is inhabited or not." },
      { "min": 85, "max": 85, "result": "Forgotten battlefield", "nextTable": null, "note": "A long-forgotten battlefield. How many died here?" },
      { "min": 86, "max": 86, "result": "Visible tower", "nextTable": "structure_table", "note": "A tower, visible off the road some distance." },
      { "min": 87, "max": 87, "result": "Settlement patrol", "nextTable": null, "note": "Patrol from the nearest settlement." },
      { "min": 88, "max": 88, "result": "Unmarked settlement", "nextTable": "unmarked_settlement", "note": "Unmarked settlement." },
      { "min": 90, "max": 94, "result": "NPC with Quest", "nextTable": "quest_generation", "note": "NPC appears with quest. (Use Chapter 7)." },
      { "min": 95, "max": 100, "result": "Monster! (Hard/Deadly)", "nextTable": "monster_generator", "note": "Monster! Level-appropriate encounter. 1-3: Hard, 4: Deadly." }
    ]
  },
  "urban_encounters": {
    "tableName": "Urban Encounters",
    "die": "d100",
    "rollType": "standard",
    "entries": [
      { "min": 1, "max": 1, "result": "Witness a Crime", "nextTable": "qa_table", "note": "You witness a crime and they have a chance to stop the criminal. If you do, you win the favor of the local constabulary. If you try to but fail, the guard gives you an opportunity to help track down the criminal. If you do nothing, you must convince the guard you are not an accomplice." },
      { "min": 2, "max": 2, "result": "Stampede of pigs", "nextTable": null, "note": "Stampede of pigs" },
      { "min": 3, "max": 3, "result": "Army at the Gates!", "nextTable": "qa_table", "note": "A cry rings out through the town. “An army is massing outside the gates!” Are they human, orc, mind flayer? You had better go and find out, or flee right now!" },
      { "min": 4, "max": 4, "result": "Mysterious Beggar", "nextTable": null, "note": "A mysterious hooded beggar conspicuously ducks into an alley as they walk by - they appeared to have a disfigurement. Perhaps they were just trying to hide from people." },
      { "min": 5, "max": 5, "result": "Guided Tour", "nextTable": null, "note": "A guided tour proceeds past, as the guide drops a particularly tasty snippet of local knowledge which the PC was unaware of." },
      { "min": 6, "max": 6, "result": "Shady Alley Figure", "nextTable": "qa_table", "note": "A shady figure beckons from an alley. They have wondrous items for sale, they say." },
      { "min": 7, "max": 7, "result": "The Witches' Creature", "nextTable": "creatures_table", "note": "Two old ladies, witches of some sort by the look of them, beg you to take a creature off their hands. (Roll Creature Table, Chapter 14). “It never shuts up!” they tell you. “Please, we’ll pay you! We just want to be rid of the damnded thing!” The creature is the trapped soul of a former adventurer..." },
      { "min": 8, "max": 8, "result": "Reasonable Man Argument", "nextTable": "qa_table", "note": "Two men are arguing about something. One turns to a PC and says, \"You look like a reasonable man. What do you think?\" Could be literally anything at all, and could result in combat, a job, or just more arguing." },
      { "min": 9, "max": 9, "result": "Quest Board", "nextTable": "quest_generation", "note": "Quest board with rewards for deeds done. Someone has rats in their cellar, missing townsperson in the woods neaby, simple things (or complex!) that give you little things to do that keep you exploring the city, making contacts, and earning gold/interesting items. Use Chapter 14 tables or Q/A rolls to generate." },
      { "min": 10, "max": 10, "result": "Street Card Shark", "nextTable": null, "note": "A card shark/con artist is busking in the street, a large crowd gathers." },
      { "min": 11, "max": 11, "result": "Strong-arming Thugs", "nextTable": "qa_table", "note": "Two local thugs are strong arming a merchant for gold. You can help the merchant, but doing so annoys the local gang. Variation: The merchant is a thief, and the thugs are trying to recover their stolen money." },
      { "min": 12, "max": 12, "result": "House Fire", "nextTable": null, "note": "You notice a group of villagers attempting to put out a nearby house fire. This looks like it could easily spread to neighbouring houses, possibly affecting the whole town." },
      { "min": 13, "max": 13, "result": "Peddler", "nextTable": null, "note": "A peddler attempts to sell you a trinket or minor magic item." },
      { "min": 14, "max": 14, "result": "Rat vs. Dog", "nextTable": null, "note": "A giant rat crawls out of a storm drain and gets into a fight with a dog." },
      { "min": 15, "max": 15, "result": "Minor Earthquake", "nextTable": "qa_table", "note": "Minor earthquake shakes things up and in the ensuing panic looters take advantage. Does the party join them, or stop them?" },
      { "min": 16, "max": 16, "result": "Merchant Request", "nextTable": null, "note": "Merchant asking for help stopping local children with slingshots." },
      { "min": 17, "max": 17, "result": "Cornered Urchin", "nextTable": "qa_table", "note": "A young urchin is in an ally, cornered by either thugs or stray dogs." },
      { "min": 18, "max": 18, "result": "Block Party", "nextTable": null, "note": "Street is having a block party tomorrow and need help setting up." },
      { "min": 19, "max": 19, "result": "Sentenced to Death", "nextTable": "qa_table", "note": "Someone sentenced to death: You happen across the hanging/beheading scene before it concludes, what do you do?" },
      { "min": 20, "max": 25, "result": "Monster Encounter (Easy)", "nextTable": "monster_generator", "note": "Monster: Level appropriate easy encounter." },
      { "min": 26, "max": 26, "result": "Jewel Con Man", "nextTable": null, "note": "A con man is selling jewels and rare components that you might need." },
      { "min": 27, "max": 27, "result": "Chamber Pot Save", "nextTable": null, "note": "A chamber pot is emptied from above. Make a DC 13 dex save to avoid. If unsuccessful, you disadvantage all charisma and stealth related rolls until you have a bath and change clothes. (Optional: make a con save vs filth fever)." },
      { "min": 28, "max": 28, "result": "Desperate Note", "nextTable": "qa_table", "note": "A scrap of paper is pressed into your hand by a young man, who looks at you desperately before turning and running away. You turn over the note and read it. “Please help, he’s coming for us all!”" },
      { "min": 29, "max": 29, "result": "Local Guard", "nextTable": null, "note": "A member of the local guard asks you what your business is in town." },
      { "min": 30, "max": 30, "result": "Accused of Theft", "nextTable": "qa_table", "note": "“Stop, thief!” You feel your arms being grabbed. The local guard apprehend you, accusing you of stealing jewels belonging to a noble/royal. Searching your clothes, and/or bag, they successfully turn up the jewels in question. You, however, have never seen them before." },
      { "min": 31, "max": 31, "result": "Balcony Kiss", "nextTable": null, "note": "A lady / young man on a balcony blows you a kiss and then runs away." },
      { "min": 32, "max": 32, "result": "Diseased Beggar", "nextTable": null, "note": "A beggar crouches in a dark corner, clearly diseased." },
      { "min": 33, "max": 33, "result": "Mistaken Identity", "nextTable": null, "note": "Someone mistakes you for a mercenary, famous performer, or an old friend. They have face blindness. 2% of the population have it." },
      { "min": 34, "max": 34, "result": "Song Bard", "nextTable": null, "note": "A bard strikes up a song and starts following you around." },
      { "min": 35, "max": 35, "result": "Beggar Guide", "nextTable": null, "note": "A beggar notices the group and offers to guide them around in exchange for coin." },
      { "min": 36, "max": 36, "result": "Bar Fight", "nextTable": "qa_table", "note": "Bar fight bursts out into the street and may involve the PC." },
      { "min": 37, "max": 37, "result": "Propositioned", "nextTable": "qa_table", "note": "Propositioned. Person of the night propositions a player. But they may not be all they seem..." },
      { "min": 38, "max": 38, "result": "Drunkard Mistake", "nextTable": null, "note": "A drunkard sees you and mistakes them for friends or enemies or perhaps throws up on you." },
      { "min": 39, "max": 39, "result": "PC Fan", "nextTable": null, "note": "A person who claims to be a fan of the PC begins to follow them around" },
      { "min": 40, "max": 40, "result": "Snake Oil Salesman", "nextTable": "qa_table", "note": "Snake Oil Salesman has gathered a crowd, and has actors in the group to fool people into buying worthless potions. Bonus: they're not worthless, but definitely not as advertised. A healing potion that's really gaseous form? Make Q/A rolls to determine results." },
      { "min": 41, "max": 41, "result": "Sewer Smugglers", "nextTable": "qa_table", "note": "Group of smugglers coming out of a sewer grate with a crate of goods." },
      { "min": 42, "max": 42, "result": "Fortune Teller", "nextTable": "qa_table", "note": "An old female fortune teller beckons to you from her tent." },
      { "min": 43, "max": 43, "result": "Window Tumble", "nextTable": "qa_table", "note": "A man tumbles out a tavern window. He’s fully dressed in nobleman’s garb. A female half-orc jumps out after him, letting out a warcry as he gets up and runs for his life screaming for help. Do you help her and run him down or do you get in her way? Possible: No matter who you help they both begin attacking you!" },
      { "min": 44, "max": 44, "result": "Dog with Hand", "nextTable": "qa_table", "note": "A street dog runs past with a human hand in its mouth - wearing a large, very obvious jeweled ring. Dog chase or find out what happened to the owner of the ring (and hand)." },
      { "min": 45, "max": 45, "result": "Spooked Horse", "nextTable": null, "note": "Someone's horse is spooked and charges through the streets. whether it’s dragging a wagon or just a rider, it is panicked and needs to be stopped." },
      { "min": 46, "max": 46, "result": "Map Fragment", "nextTable": "qa_table", "note": "You find a map, discarded, on the street, or just a fragment of one, which arouses your curiosity. It shows a ruin, and there is a sketch of an artifact. Magical? Perhaps a local mage could help you decode this..." },
      { "min": 47, "max": 47, "result": "Robbed Drunkard", "nextTable": null, "note": "A drunk just wakes up nearby. “Wha… where am I?! My… my weapons! My belongings! They’re gone!”" },
      { "min": 48, "max": 48, "result": "Talented Storyteller", "nextTable": "qa_table", "note": "You stop to listen to a talented storyteller relate a story about a famous adventurer and his beast companion. Part of the story is unresolved, however, and gets you thinking..." },
      { "min": 49, "max": 49, "result": "Noble Veggie Pelt", "nextTable": null, "note": "You feel a thwack in the side of your head, and turn to see that a bunch of drunk young nobles are pelting passers by with rotten vegetables, laughing as they do so!" },
      { "min": 50, "max": 55, "result": "Monster Encounter (Medium)", "nextTable": "monster_generator", "note": "Monster: Level appropriate medium encounter." },
      { "min": 56, "max": 56, "result": "Pickpocket Sighting", "nextTable": null, "note": "Your sharp eye spots a pickpocket deftly relieve a noblewoman of an expensive necklace." },
      { "min": 57, "max": 57, "result": "Wizard's Bag Rip", "nextTable": "qa_table", "note": "A wizard is carrying a bagful of potions when suddenly the bag rips (perhaps it catches on a nail sticking out of a building, or it catches on a passing cart) and several potions drop out and smash on the ground, exploding with various dramatic effects." },
      { "min": 58, "max": 58, "result": "Jeweller Accusation", "nextTable": null, "note": "A jeweller emerges from his shop, screaming that he’s been robbed by dwarves. A nearby dwarf asks him for proof, but all he has to say is, “Of course it’s dwarves, they lust after gems constantly!”" },
      { "min": 59, "max": 59, "result": "Priest vs Slaver", "nextTable": null, "note": "A female priest is castigating a businesswoman who has set up her wares before the temple (of Lathander, perhaps? Any good-aligned god). Except this business is no ordinary business - a female slaver is parading her wares, selling slaves to whoever’s buying." },
      { "min": 60, "max": 62, "result": "Physical/Mental Challenge", "nextTable": "element_interaction_table", "note": "Something occurs, or you find something, that requires a (roll d10) 1: acrobatics / dex check or save, 2: strength or athletics check, 3: stealth check, 4: con check or save, 5: int check, 6: investigation check, 7: arcana check, 8: history check, 9: nature check, 10: religion check. Use Q/A rolls or Story Element Interaction tables (chapter 14) to find out what." },
      { "min": 63, "max": 65, "result": "Social/Survival Challenge", "nextTable": "element_interaction_table", "note": "Something occurs, or you find something, that requires a (roll d10), 1: animal handling check, 2: insight check, 3: survival check, 4: medicine check 5: perception check, 6: persuasion check, 7: performance check, 8: deception check, 9: inimidation check, 10: charisma check. Use Q/A roll or Story Element Interaction tables (chapter 14) to find out what." },
      { "min": 66, "max": 69, "result": "NPC with Quest", "nextTable": "quest_generation", "note": "NPC met, who gives PC information about possible quest. Go to Chapter 7 and generate a quest, which you may or may not accept." },
      { "min": 70, "max": 75, "result": "Monster Encounter (Hard)", "nextTable": "monster_generator", "note": "Monster: Level-appropriate hard encounter. Monster on the loose, marauding through the streets." },
      { "min": 76, "max": 76, "result": "Guard Congratulation", "nextTable": null, "note": "You are stopped by the local guard who want to congratulate you on your recent successful quest. How do they know?" },
      { "min": 77, "max": 77, "result": "Catacomb Rumour", "nextTable": "qa_table", "note": "PC hears a rumour about a job that a local priest might have. Apparently, or so the rumour goes, something is going on in the sacred catacombs beneath the streets." },
      { "min": 78, "max": 78, "result": "Boarded Noble House", "nextTable": "qa_table", "note": "You pass a house which is all boarded up, the gates locked. A passerby informs you that this is the house of a local nobleman who hasn’t been seen in years." },
      { "min": 79, "max": 79, "result": "Alley Dice Game", "nextTable": null, "note": "You see a dice game going on in an alley off the street you are walking down." },
      { "min": 80, "max": 80, "result": "Vitriolic Cleric", "nextTable": null, "note": "A cleric stands atop a box on the roadside, spouting vitriol and nasty rumours about the town’s leader or leaders. The cleric has attracted quite a crowd." },
      { "min": 81, "max": 81, "result": "Town Hall Protest", "nextTable": null, "note": "A group of protestors has set up outside the Town Hall, protesting the new road which is planned to run right through the middle of their settlement, some distance out of town." },
      { "min": 82, "max": 82, "result": "Cart Minder", "nextTable": "qa_table", "note": "A merchant asks you to mind his cart for him while he chases a thief who has stolen merchandise from it. He then leaves, and doesn’t return for a very long time..." },
      { "min": 83, "max": 83, "result": "Temple Urchin", "nextTable": null, "note": "A street urchin appears, promising divine favour if the PC comes and volunteers an hour of service at a nearby temple." },
      { "min": 84, "max": 84, "result": "Wasp Nest Accident", "nextTable": "creatures_table", "note": "A shopkeeper is attacking a wasp nest outside of his shop with a broom. He dislodges it and it crashes to the ground, engulfing him in a Swarm of Insects!" },
      { "min": 85, "max": 85, "result": "Half-Orc Brawl", "nextTable": null, "note": "Two half-orcs are engaged in a full-on brawl outside a nearby tavern. Apparently one thinks the other cheated at dice." },
      { "min": 86, "max": 86, "result": "Pilgrim Mockery", "nextTable": null, "note": "Religious pilgrims making their way quietly through the streets are being mocked and jeered by a group of elven teenagers" },
      { "min": 87, "max": 87, "result": "Cloak Note", "nextTable": "qa_table", "note": "A tattered cloak blows up the street. Catching hold of it, you find a note in one of its pockets." },
      { "min": 88, "max": 88, "result": "Hallucinogenic Air", "nextTable": "qa_table", "note": "Someone has released a hallucinogenic substance into the air, and people are in various states of intoxication." },
      { "min": 89, "max": 89, "result": "Distraught Mother", "nextTable": "qa_table", "note": "A distraught mother cannot find her child and is convinced it has been kidnapped. She is moving from person to person, begging for help." },
      { "min": 90, "max": 90, "result": "Sudden Gust of Wind", "nextTable": "qa_table", "note": "A sudden gust of wind whips through the town, sending stalls toppling over, hats flying, stacks of parchment fluttering down the street. Perhaps the PC discovers something as a result." },
      { "min": 91, "max": 91, "result": "Dwarf vs Halfling", "nextTable": "qa_table", "note": "A dwarf, armed with greataxe, is threatening a cowering halfling, who is shaking with fear. The dwarf is living with rage, but has just been disarmed by the town guard. What’s the situation here? Has the halfling wronged him in some way?" },
      { "min": 92, "max": 92, "result": "Cart Gridlock", "nextTable": null, "note": "An overturned cart ahead is causing gridlock - the street is jammed with traffic." },
      { "min": 93, "max": 93, "result": "Street Prostitute", "nextTable": null, "note": "“Ay oop luv, looking for a good time?” A prostitute (any sex or race) begins soliciting you earnestly." },
      { "min": 94, "max": 94, "result": "Appearing Mage", "nextTable": null, "note": "Suddenly, out of the blue, you see a mage of some sort simply appear in the middle of the street/alley." },
      { "min": 95, "max": 99, "result": "NPC with Quest", "nextTable": "quest_generation", "note": "NPC appears with quest (see Chapter 7)" },
      { "min": 100, "max": 100, "result": "Monster Encounter (Deadly)", "nextTable": "monster_generator", "note": "Monster: Level appropriate deadly encounter." }
    ]
  },
  "dungeon_encounters": {
    "tableName": "Dungeon Encounters",
    "die": "d100",
    "rollType": "standard",
    "entries": [
      { "min": 1, "max": 5, "result": "Physical/Mental Challenge", "nextTable": "element_interaction_table", "note": "Something occurs, or you find something, that requires a (roll d10) 1: acrobatics / dex check or save, 2: strength or athletics check, 3: stealth check, 4: con check or save, 5: int check, 6: investigation check, 7: arcana check, 8: history check, 9: nature check, 10: religion check. Use Q/A rolls or Story Element Interaction tables (chapter 14) to find out what." },
      { "min": 6, "max": 10, "result": "Social/Survival Challenge", "nextTable": "element_interaction_table", "note": "Something occurs, or you find something, that requires a (roll d10), 1: animal handling check, 2: insight check, 3: survival check, 4: medicine check 5: perception check, 6: persuasion check, 7: performance check, 8: deception check, 9: inimidation check, 10: charisma check. Use Q/A rolls or Story Element Interaction Tables (chapter 14) to find out what." },
      { "min": 11, "max": 15, "result": "NPC with Quest", "nextTable": "quest_generation", "note": "NPC gives you information about possible quest. Go to Chapter 7 and generate a quest, which you may or may not accept. (Generate NPC as well – Chapter 13)." },
      { "min": 16, "max": 20, "result": "Monster Encounter (Easy)", "nextTable": "monster_generator", "note": "Monster: Level-appropriate easy encounter. Go to Chapter 16." },
      { "min": 21, "max": 25, "result": "Monster Encounter (Medium)", "nextTable": "monster_generator", "note": "Monster: Level-appropriate medium encounter. Go to Chapter 16." },
      { "min": 26, "max": 30, "result": "Monster Encounter (Hard)", "nextTable": "monster_generator", "note": "Level appropriate hard encounter. Go to Chapter 16." },
      { "min": 31, "max": 35, "result": "Monster Encounter (Deadly)", "nextTable": "monster_generator", "note": "Level appropriate deadly encounter. Go to Chapter 16. Your PC might want to flee!" },
      { "min": 36, "max": 36, "result": "Monster Carcass", "nextTable": "qa_table", "note": "Dead beast or monster carcass. What happened here?" },
      { "min": 37, "max": 37, "result": "Strange Growth", "nextTable": null, "note": "You find a strange growth in this area, on the dungeon walls. Is it a moss of some kind?" },
      { "min": 38, "max": 38, "result": "Crumbled Floor", "nextTable": null, "note": "Part of the floor has crumbled away, revealing a black, empty space below." },
      { "min": 39, "max": 39, "result": "Mossy Door", "nextTable": "qa_table", "note": "A door covered in moss, with a large knocker. Looks like it’s been transplanted here from someone’s garden." },
      { "min": 40, "max": 40, "result": "Child coffins", "nextTable": null, "note": "You enter a tomblike area. All of the coffins are child-sized." },
      { "min": 41, "max": 41, "result": "Strange vines", "nextTable": null, "note": "Strange vines have grown all through here, creeping around the stonework and gradually, over time, destroying parts of the masonry. How did they get in here?" },
      { "min": 42, "max": 42, "result": "Wizard Statue", "nextTable": "qa_table", "note": "You see a statue of a wizard in the middle of this area. The plaque beneath reads “I am Fennishaw Eldsight. Speak my name and bring me to life, if you dare!”" },
      { "min": 43, "max": 43, "result": "Barbarian Parley", "nextTable": "a_npc_generator", "note": "You hear voices ahead, and turn the corner to see a barbarian parleying with an ogre! Apparently they are discussing what the ogre’s price is for releasing the half-orc he is currently holding hostage." },
      { "min": 44, "max": 44, "result": "Whispering Voice", "nextTable": "qa_table", "note": "A voice repeatedly whispers, “What do you seek?” No matter how you respond, it repeats the same question. (Perhaps until you give the true answer, at which point, you may get what you seek, but not as you expected!) Who does this voice belong to, if anyone?" },
      { "min": 45, "max": 45, "result": "Falling NPC", "nextTable": "a_npc_generator", "note": "The ceiling above you opens, and an unexpected NPC falls through screaming, hitting the ground in front of you! Roll NPC Tables to find out who it is." },
      { "min": 46, "max": 46, "result": "Mining Operation", "nextTable": "qa_table", "note": "This area is home to a mining operation. Enslaved humanoid children are toiling away, loading rocks into mine carts for ore processing. Their masters whip and force them to continue on, despite their obvious fatigue." },
      { "min": 47, "max": 47, "result": "Slumped Woman", "nextTable": "a_npc_generator", "note": "A middle-aged woman is slumped against the wall, sobbing. She is dressed in rags." },
      { "min": 48, "max": 48, "result": "Booming Voice", "nextTable": "qa_table", "note": "From nowhere, you hear a booming voice: “Take up your weapon, adventurer! You dare to trespass here, now you will face me in battle!” But no one appears. At least not yet… You hear laughing..." },
      { "min": 49, "max": 49, "result": "Vision", "nextTable": null, "note": "Suddenly a vision flickers before you, a vision of your ultimate goal in this dungeon. You do not recognize the room, but get some prior information about what you might be headed towards." },
      { "min": 50, "max": 55, "result": "TRAP!", "nextTable": "traps_table", "note": "TRAP! Roll on Traps table to find out what." },
      { "min": 56, "max": 56, "result": "Graffiti", "nextTable": null, "note": "Graffiti on the wall: “Stop! Bridge out ahead! Go back, your doom is at hand!”" },
      { "min": 57, "max": 57, "result": "Barking Dog", "nextTable": "qa_table", "note": "Nearby, you hear a dog barking madly, then another voice telling it to shut up!" },
      { "min": 58, "max": 58, "result": "Screaming", "nextTable": null, "note": "You hear screaming, very faint, as if from far, far away." },
      { "min": 59, "max": 59, "result": "Heated quarrel", "nextTable": "a_npc_generator,a_npc_generator", "note": "You round the next corner and see two humanoids engaged in a heated quarrel." },
      { "min": 60, "max": 60, "result": "Pack theft", "nextTable": null, "note": "Make a perception check, DC 14. If unsuccessful, you suddenly notice your pack is lighter. Randomly choose one item from your inventory (perhaps figure out a way to randomly roll for it). It has been stolen! You might get it back, but then again..." },
      { "min": 61, "max": 61, "result": "Dungeon Caretaker", "nextTable": "qa_table", "note": "You come to a door on which a parchment is nailed. “Dungeon caretaker. Enquiries/complaints within.”" },
      { "min": 62, "max": 62, "result": "Exploding wall", "nextTable": "a_npc_generator,a_npc_generator", "note": "Suddenly the wall behind you explodes, and two adventurers enter through it. One is a goliath who has just punched his way through the masonry, the other appears to be a halfling sorcerer." },
      { "min": 63, "max": 63, "result": "Orc guards", "nextTable": "monster_generator", "note": "Ahead, two orc guards sit at a guard post. They appear to be playing dice." },
      { "min": 64, "max": 64, "result": "Rat and Goblins", "nextTable": null, "note": "A giant rat runs past you, closely followed by three hungry-looking goblins. They pay you no attention." },
      { "min": 65, "max": 65, "result": "Alarm Spell", "nextTable": "monster_generator", "note": "As you move through this area, make a perception check, DC 15. If you fail, you do not see a glyph on the wall and trigger an alarm spell! What comes to check?" },
      { "min": 66, "max": 66, "result": "Festering rubbish", "nextTable": "creatures_table", "note": "In a corner, a huge pile of rubbish festers. It is being picked through by some horrid beast or other." },
      { "min": 67, "max": 67, "result": "Rank smell", "nextTable": "qa_table", "note": "You get the distinct impression that you are being followed. You even fancy you can smell whoever it is, and they smell rank." },
      { "min": 68, "max": 68, "result": "Massacre", "nextTable": null, "note": "You happen upon a massacre. The corpses of a dozen humanoids lie scattered." },
      { "min": 69, "max": 69, "result": "Mist", "nextTable": null, "note": "A mist swirls about your feet." },
      { "min": 70, "max": 70, "result": "Hard shove", "nextTable": "qa_table", "note": "You feel a hard shove in your back. When you turn to look, is anyone there?" },
      { "min": 71, "max": 71, "result": "Secret stone", "nextTable": "passage_or_room_check", "note": "Roll perception, DC 14. If successful you notice something in your periphery. A stone in the wall shuts with a scrape. Investigation roll, DC 12, to find the mechanism to open it. Beyond is a (d4) 1-2: passage, 3-4: room, containing an encounter (d4) 1: Easy, 2: Medium, 3: Hard, 4: No encounter. Clue 75%, Individual Loot 50%." },
      { "min": 72, "max": 72, "result": "Old timer", "nextTable": "a_npc_generator", "note": "An old timer, clearly mad, is perched on a soapbox to the side of this passage, ranting about the current state of political affairs to an audience of one slightly amused boggart." },
      { "min": 73, "max": 73, "result": "Hidden item", "nextTable": "qa_table", "note": "As you round the next corner, you catch sight of a lone humanoid. Make a stealth check, DC 14. If successful, you stay hidden and watch as they move a stone in the wall, place something behind it, then replace the stone. Then they depart." },
      { "min": 74, "max": 74, "result": "Prisoners", "nextTable": "a_npc_generator", "note": "You come across a proper dungeon - a locked room with bars, in which you see several ragged-looking prisoners. “Quick, break us out!” one of them exclaims when he sees you." },
      { "min": 75, "max": 75, "result": "Spectral Doorman", "nextTable": "qa_table", "note": "You come across an ornate door, attended by a spectral figure dressed in opulent clothes. The thing is non-hostile, and manning this door, like a doorman. Roll a d4. On a 1: He praises you and your obvious prowess as an adventurer. He seems to know a lot. The spectral doorman admits opens the door for you. On a 2: He begins insulting you, pointing out how awful your clothes are, how ugly you are, how terrible you smell! Make a wisdom check, DC 15. If you succeed, he congratulates you on your poise in the face of abuse and lets you through the door. On 3-4: He begins debating with you as to why you shouldn’t be admitted through the door. Make an intelligence check or a persuasion check, DC 14. If successful, you win the debate and he lets you through the door. The spectral doorkeeper cannot be attacked or moved. And the door only opens for him. (40% boss encounter)." },
      { "min": 76, "max": 76, "result": "Kindly goblin", "nextTable": "monster_generator", "note": "A kindly little goblin appears with hat in hand, and begs your help in ridding him of a problem. He has just returned from a trip to the nearest town to find that his home has been taken over! Two levels down, his humble little abode that he shares with his wife and two little goblings, has been invaded by a horrible (insert level appropriate hard encounter here). If he could get your assistance in getting rid of this scourge, he will reward you with all his profits from his recent sales trip - 250 gp! And his wife will cook you a delicious pot of Tunnelslug Stew, finest in the dungeon, they say!" },
      { "min": 77, "max": 77, "result": "Rival adventurers", "nextTable": "a_adv_generator", "note": "You run into some rival adventurers, who happen to be there following the same leads as you. Will you team up these NPCs? (Use NPC tables to determine who they are, skipping Profession and going straight to Class Tables)." },
      { "min": 78, "max": 78, "result": "Portal", "nextTable": null, "note": "You take one more step and… boom! You are in an utterly unfamiliar part of the dungeon. Abandon the map you have so far. You have stepped through a portal, and now are not even sure you are in the same dungeon, realm, or world! Where have you been transported?" },
      { "min": 79, "max": 79, "result": "Opulent room", "nextTable": "qa_table", "note": "You find a secret entrance to an opulent room, lined with bookshelves. A fire crackles in the hearth, and richly-patterned rugs and furniture decorate this cosy space. Who lives here?" },
      { "min": 80, "max": 80, "result": "Ancient scrolls", "nextTable": "quest_generation", "note": "You find small circular openings in the walls. Each contains a scroll. Withdrawing them, you see that they bear writing from some ancient civilization. These could be of great worth to an archaeologist, but first you will need to get them translated. What secrets do they hold? (Roll a d8. The scrolls are in 1: Infernal, 2: Abyssal, 3: Celestial, 4: Draconic, 5: Druidic, 6: Giant, 7: Primordial, 8: Undercommon. If you happen to speak the resultant language, use Q/A rolls to determine what they contain. Perhaps a quest! Or some valuable knowledge. They might be worth something, too, to the right buyer)." },
      { "min": 81, "max": 81, "result": "Humanoids arguing", "nextTable": "monster_generator", "note": "1d4-1 humanoids are arguing and do not notice your approach. One is a commander, the other(s) subordinate. The subordinate has failed in the execution of some task. The rest of your story will hopefully provide the context here. If you choose to attack, this will be a (d4) 1: Easy, 2-3: Medium, 4: Hard encounter. You may choose an appropriate enemy based on the encounter guidelines in Chapter 16. Individual loot 50% (roll twice, once for each humanoid)" },
      { "min": 82, "max": 82, "result": "Forgotten shrine", "nextTable": null, "note": "You find the shrine of a long-forgotten deity. (Loot Hoard 30%). Perhaps this deity tries to commune with you, attempting to find a new worshipper?" },
      { "min": 83, "max": 83, "result": "Mural", "nextTable": "quest_generation", "note": "You see an ornate historical mural on a nearby wall, faded but obviously painted / carved by a master artist. As you watch, the figures in the mural come to life and begin to play out a scene hitherto unknown to you. You gain knowledge of this episode of history, and possibly of some previously undiscovered location/quest/relic associated with it. (Consult the history of your setting / use Q/A rolls to find out what… player’s choice!)" },
      { "min": 84, "max": 84, "result": "Ceremony", "nextTable": "qa_table", "note": "You enter a chamber where a sacrificial ceremony is taking place. Several humanoids are gathered around a plinth, about to sacrifice a live beast. Who knows what the outcome of this ritual will be?" },
      { "min": 85, "max": 85, "result": "Stalked", "nextTable": "qa_table", "note": "You get the feeling you are being stalked by something, some invisible force. You see shadows, hear noises, feel a presence, but every time you turn you see nothing. Perhaps it will show itself eventually. Perhaps it is another adventurer, or perhaps… something more sinister." },
      { "min": 86, "max": 86, "result": "Chess gnome", "nextTable": null, "note": "In the next room, a gnome sits at a table in a sparse room before a chess board. He invites you to play. Playing requires a DC 15 deception or intelligence check. If successful, the gnome will gift you with a useful trinket of gnomish invention, or 50 gp. If unsuccessful, you surrender an item of 50 gp worth. You can refuse this invitation if you wish. The gnome will also just talk if you want - he will welcome the company, and is a wealth of information about the dungeon." },
      { "min": 87, "max": 87, "result": "Underground tavern", "nextTable": null, "note": "You find an underground tavern, where dungeon denizens like to stop and get an ale every now and then before returning to their murderous exploits! It’s called The Delver’s Rest and the patronage is steady! (If this is too silly, re-roll)." },
      { "min": 88, "max": 88, "result": "Alchemist", "nextTable": "qa_table", "note": "You find a secret door to a chamber where an alchemist is busy preparing potions and tinctures of all kinds. He might be open to bartering, but is currently trying to prepare something that will “stop all hell breaking out in this place.” If you try to attack him, you find he is protected by an impenetrable magic barrier, which only he can let down." },
      { "min": 89, "max": 89, "result": "Dimensional door", "nextTable": null, "note": "You find a dimensional door into a forest, but can’t be sure if this wilderness is real, or simply an illusion to lead you into even greater danger." },
      { "min": 90, "max": 90, "result": "Slime", "nextTable": "qa_table", "note": "In this area are some pools of greyish-green slime of unknown nature. Q/A and nature rolls to determine more about their nature." },
      { "min": 91, "max": 91, "result": "Light out", "nextTable": null, "note": "If the party are holding torches, or there are torches or candles present in the area, something blows them all out suddenly." },
      { "min": 92, "max": 92, "result": "Mist/fog", "nextTable": null, "note": "The area is filled with a thick mist/fog, that hangs heavy and low to the ground." },
      { "min": 93, "max": 93, "result": "Small girl", "nextTable": null, "note": "In the distance a small girl dressed in rags can be seen standing near the wall. If players move toward her, she will turn and run through the nearest wall and disappear." },
      { "min": 94, "max": 94, "result": "Skeletons", "nextTable": "creatures_table", "note": "To the far side three skeletons hang on manacles, if they are inspected 1d6 rats will jump out at the PCs." },
      { "min": 95, "max": 95, "result": "Tendrils", "nextTable": null, "note": "The ground here is earthen and covered with a top soil. It smells heavily of must and dirt. Root-like tendrils will start to appear out of the ground and start to grow up the walls." },
      { "min": 96, "max": 96, "result": "Bitten", "nextTable": "qa_table", "note": "A player is bitten on the hand (causing minimal if no damage). What did it?" },
      { "min": 97, "max": 97, "result": "Rumble", "nextTable": null, "note": "A low rumble, then a deep cracking noise is heard directly above. The area shakes slightly, dust and small debris falls from the ceiling, then it stops." },
      { "min": 98, "max": 98, "result": "Lost Bard", "nextTable": "a_npc_generator", "note": "A bard has stopped in this area to belt out a quick song to try and lift his own spirits. He’s been lost down here for days! He tells you that he’s managed to find his way up to this level with some difficulty, but that this dungeon descends many levels downward. He was held captive by some kind of humanoid until just recently. He’s absolutely starving, having had to subsist on dungeon moss and tunnelslugs for weeks." },
      { "min": 99, "max": 99, "result": "Dragging noise", "nextTable": "qa_table", "note": "You hear the sound of something heavy being dragged, coming from up ahead." },
      { "min": 100, "max": 100, "result": "Terrified humanoids", "nextTable": "monster_generator", "note": "A large group of humanoids comes running down the tunnel towards you, their expressions showing absolute, abject terror. “RUN!” the lead one yells at you. “Save yourself, run, now!!!” Behind them, you see something BIG following..." }
    ]
  },

  "active_area_discovery_table": {
    "tableName": "Active Area Discovery",
    "die": "d100",
    "rollType": "standard",
    "entries": [
      { "min": 1, "max": 25, "result": "Rumours / Leads Proof", "nextTable": "wilderness_clue_table", "note": "This area contains more proof of the rumours / leads you are investigating. Roll once on Clue Table (this chapter), or on Chapter 14 tables, then roll again on this table." },
      { "min": 26, "max": 53, "result": "Target Found", "nextTable": "monster_generator", "diceroll": "1d6", "note": "You find the beast / monster / cause of the problem you have been looking for. Roll d6. 1-3: Medium Encounter. 4-5: Hard Encounter. 6: Deadly Encounter. (Use Chapter 16). 50% chance you haven’t been noticed. On a successful stealth roll (DC=Creature’s passive perception), attack with surprise." },
      { "min": 54, "max": 80, "result": "Target Found (Lair/Ruins)", "nextTable": "starting_area", "diceroll": "1d6", "note": "You find the beast / monster / cause of the problem you have been looking for, and an associated structure or dwelling, such as a lair or ruins that they inhabit. (You could go to Chapter 8: Dungeon Generation from here) When you find them, roll d6. 1-3: Medium Encounter. 4-5: Hard Encounter. 6: Deadly Encounter. (Use Chapter 16)." },
      { "min": 81, "max": 82, "result": "Uninhabited Lair", "note": "You find a lair or dwelling, but it appears currently uninhabited. Perhaps the creature you seek is away causing mischief right now!" },
      { "min": 83, "max": 84, "result": "Creature Stalking PCs", "note": "Stealth check from all your PCs. If one check is lower than 14, then the creature has noticed your PCs’ arrival and is stalking them, preparing an attack. They will probably be surprised!" },
      { "min": 85, "max": 86, "result": "False Rumour", "nextTable": "wilderness_encounters", "diceroll": "1d100dc25", "note": "This area is not what it was rumoured to be. Make a d100 rolls. If it is 25 or below, roll on the Wilderness Encounter Table. After resolving the encounter, continue exploring the area and make an investigation check, DC 15. If successful, roll again on this table. If unsuccessful, make another d100 roll (as above)" },
      { "min": 87, "max": 88, "result": "Rival Adventurers", "nextTable": "a_adv_generator", "diceroll": "1d4,1d4", "note": "You find another party of adventurers investigating the same rumours / leads you are investigating. They are (d4) 1: Hostile, 2-4: Friendly. There are 1d4 members in the party. Roll on NPC tables (skip professions and roll on class tables instead) to determine who they are, then roll again on this table." },
      { "min": 89, "max": 90, "result": "Savaged Dead Adventurers", "diceroll": "1d4", "note": "You find a dead party of 1d4 adventurers (use NPC tables if you wish). They have been hacked / maimed savagely, and it appears all their weapons and belongings have been stolen." },
      { "min": 91, "max": 92, "result": "Dead Adventurers", "diceroll": "1d4", "note": "You find a dead party of 1d4 adventurers (use NPC tables if you wish)." },
      { "min": 93, "max": 94, "result": "Important Quest NPC", "nextTable": "quest_generation", "note": "You meet an NPC, who gives you details of another, far more important quest related to this one. Go to Chapter 7: Quest Generation to find out what it is." },
      { "min": 95, "max": 96, "result": "Target Departed", "note": "You discover that the creature or target you seek has discovered that something is tracking them, and has departed the area. You could pursue (further rolls on Wilderness generation tables, above), or you could declare the matter solved (10% chance they return once you are gone)." },
      { "min": 97, "max": 98, "result": "Lone Mysterious Hero", "note": "A mysterious NPC, a lone adventurer, is present here, and has resolved the issue. They give proof too (carcass / spoils of completed quest). They tell you that you may claim the fame of completing this, as long as you accompany them." },
      { "min": 99, "max": 99, "result": "Innocent Target / Deception", "note": "The target or creature you already seek is dead (possibly by another party of adventurers, who you may meet nearby), but on investigation you discover that the creature did not deserve to die and were probably innocent or were just minding their own business. Whoever gave you these rumours or set you on this quest is either deluded, or else deliberately deceiving you for some reason." },
      { "min": 100, "max": 100, "result": "Ambush Trap!", "nextTable": "monster_generator", "note": "The rumour turns out to be some sort of devious trap to lure your PCs into an ambush! Level appropriate deadly encounter." }
    ]

    function getTable(tableName) { return FULL_LIBRARY[tableName] || null; }

    function getColumnValue(entry, col) {
        if (entry[col] !== undefined && entry[col] !== null) return entry[col];
        // Try to extract the parenthesized range, e.g., "(0-99)" -> "0-99"
        const match = col.match(/\(([^)]+)\)/);
        if (match && entry[match[1]] !== undefined) return entry[match[1]];
        return "—";
    }

    // ================================
    // 3. ROUTER MASTER DETECTION & HANDLING
    // ================================
    function isRouterMaster(tableKey) {
        const table = getTable(tableKey);
        if (!table || table.rollType !== "standard") return false;
        const nextTables = [...new Set(table.entries.map(e => e.nextTable).filter(Boolean))];
        if (nextTables.length !== 1) return false;
        const detail = getTable(nextTables[0]);
        return detail && detail.rollType === "multi-column";
    }

    // Rolls a router master table (e.g., Situations or Keywords) and returns plain text.
    // Always rolls 3 times (original behaviour for Situations).
    function rollRouterMaster(masterKey, rolls = 3) {
        const master = getTable(masterKey);
        if (!master) return `[Missing master table: ${masterKey}]`;
        const detailKey = master.entries[0].nextTable;
        const detail = getTable(detailKey);
        if (!detail) return `[Missing detail table: ${detailKey}]`;

        const masterDieMax = parseInt(master.die.slice(1), 10);
        const detailDieMax = parseInt(detail.die.slice(1), 10);
        const results = [];

        for (let i = 0; i < rolls; i++) {
            const masterRoll = Math.floor(Math.random() * masterDieMax) + 1;
            const masterEntry = master.entries.find(e => masterRoll >= e.min && masterRoll <= e.max);
            if (!masterEntry) continue;
            const colKey = masterEntry.result; // e.g. "0-99"
            const detailRoll = Math.floor(Math.random() * detailDieMax) + 1;
            const detailEntry = detail.entries.find(e => detailRoll >= e.min && detailRoll <= e.max);
            const verb = (detailEntry && detailEntry[colKey]) ? detailEntry[colKey] : "—";
            results.push(
                `🎲 ${master.tableName} (${master.die} → ${masterRoll}): ${colKey}\n` +
                `  ↳ 🎲 ${detail.tableName} (${detail.die} → ${detailRoll}): ${verb}`
            );
        }
        return results.join("\n");
    }

    // ================================
    // 4. CORE ROLL FUNCTIONS
    // ================================
    function rollStandardTable(tableName, modifier = 0, depth = 0, forcedRoll = null) {
        const table = getTable(tableName);
        if (!table) return `[Missing table: ${tableName}]`;

        let rawRoll = (forcedRoll !== null) ? forcedRoll : evaluateDiceExpr(table.die);
        let finalRoll = rawRoll + modifier;
        let entry = table.entries.find(e => finalRoll >= e.min && finalRoll <= e.max);
        if (!entry) {
            if (finalRoll > 0) entry = table.entries[table.entries.length-1];
            else return `[No entry for roll ${finalRoll} on ${tableName}]`;
        }

        let mainResult = "";
        if (entry.result) mainResult = entry.result;
        else if (entry.population) mainResult = `${entry.type} (population: ${entry.population || "?"})`;
        else if (entry.type) mainResult = entry.type;
        else if (entry.size) mainResult = `${entry.size} · ${entry.rooms || ""}`;
        else if (entry.problem) mainResult = `${entry.problem} → ${entry.resultant_quest || "quest"}`;
        else if (entry.Emotion) mainResult = `${entry.Emotion} (${entry.Mod || "?"})`;
        else if (entry.Profession) mainResult = entry.Profession;
        else mainResult = "✔️ result found";

        let extra = "";

        // Handle diceroll
        if (entry.diceroll) {
            const trimmed = entry.diceroll.trim();
            // If it's a simple modifier like "+40" or "-5", it will be used for nextTable (handled later)
            // For display, we only show non-modifier dice expressions
            if (!/^[\+\-]\d+$/.test(trimmed)) {
                const rollDisplay = formatDiceRolls(entry.diceroll);
                if (rollDisplay) extra = ` [rolled: ${rollDisplay}]`;
            }
        }

        let output = `🎲 ${table.tableName} (${table.die}${modifier !== 0 ? ` ${modifier > 0 ? `+${modifier}` : modifier}` : ''} → ${finalRoll}): ${mainResult}${extra}`;
        if (entry.note) output += `\n  📝 Note: ${entry.note}`;

        if (entry.nextTable) {
            const nextTables = entry.nextTable.split(',').map(s=>s.trim());
            let mods = [];

            // Only treat diceroll as modifier if it's a simple signed number
            if (entry.diceroll && /^[\+\-]\d+$/.test(entry.diceroll.trim())) {
                mods = evaluateMultiple(entry.diceroll);
            }
            while(mods.length < nextTables.length) mods.push(0);
            for(let i=0; i<nextTables.length; i++) {
                const next = nextTables[i];
                const modVal = mods[i] || 0;
                let subResult;
                if (isRouterMaster(next)) {
                    let num = (table.tableName == "situations_master_table" || table.tableName == "keyword_master_table" ? 3 : 1);
                    subResult = rollRouterMaster(next, num);
                } else {
                    const nextTableObj = getTable(next);
                    if (nextTableObj && nextTableObj.rollType === "multi-column") {
                        subResult = rollMultiColumnPlain(next);
                    } else {
                        subResult = rollStandardTable(next, modVal, depth + 1, null);
                    }
                }
                output += `\n${'  '.repeat(depth + 1)}↳ ` + subResult;
            }
        }
        return output;
    }

    function rollMultiColumnPlain(tableName, selectedColumn = null, forcedRoll = null) {
        const table = getTable(tableName);
        if (!table) return `[Missing table: ${tableName}]`;
        const dieMax = parseInt(table.die.slice(1), 10);
        const roll = (forcedRoll !== null) ? forcedRoll : Math.floor(Math.random() * dieMax) + 1;
        const columns = table.columns || [];
        const entry = table.entries.find(e => roll >= e.min && roll <= e.max);
        if (!entry) return `No match for roll ${roll}`;

        let output = `🎲 ${table.tableName} (${table.die} → ${roll})`;
        if (selectedColumn && entry[selectedColumn] !== undefined) {
            output += `: ${entry[selectedColumn]}`;
        } else {
            output += `:\n`;
            for (let col of columns) {
                let val = getColumnValue(entry, col);
                output += `  ${col}: ${val}\n`;
            }
            output = output.trimEnd();
        }

        // Handle nextTable
        if (entry.nextTable) {
            const nextTables = entry.nextTable.split(',').map(s => s.trim());
            for (let next of nextTables) {
                let nested;
                if (isRouterMaster(next)) {
                    let num = (table.tableName == "situations_master_table" || table.tableName == "keyword_master_table" ? 3 : 1);
                    nested = rollRouterMaster(next, num);
                } else {
                    const nextTableObj = getTable(next);
                    if (nextTableObj && nextTableObj.rollType === "multi-column") {
                        nested = rollMultiColumnPlain(next);
                    } else {
                        nested = rollStandardTable(next, 0, 0);
                    }
                }
                output += `\n  ↳ ${nested.replace(/\n/g, '\n    ')}`;
            }
        }
        if (entry.note) output += `\n  📝 Note: ${entry.note}`;
        return output.trim();
    }

    function performRoll() {

        const tbl = FULL_LIBRARY[key];
        if (!tbl) {
            document.getElementById('resultOutput').innerHTML = `<span class="error-message">❌ Table missing: ${key}</span>`;
            return;
        }

        // Router master (Situations, Keywords, etc.)
        if (isRouterMaster(key)) {
            let num = (key == "situations_master_table" || key == "keyword_master_table" ? 3 : 1);
            const plainResult = rollRouterMaster(key, num);
            const htmlResult = `<div style="white-space: pre-wrap;">${escapeHtml(plainResult)}</div>`;
            addToHistory(tbl.tableName || key, plainResult, tbl.die);
            document.getElementById('rollValueBadge').innerText = `🎲 ${tbl.die}`;
            document.getElementById('resultOutput').innerHTML = htmlResult;
            return;
        }

        const rollValueSpan = document.getElementById('rollValueBadge');
        rollValueSpan.innerText = `Rolling...`;
        setTimeout(() => {
            let resultHtml, plainResult;
            if (tbl.rollType === "multi-column") {
                const dieMax = parseInt(tbl.die.slice(1), 10);
                const columns = tbl.columns || [];
                const isRegionalRace = (tbl.tableName === "Regional Race Discovery Table");
                let html = `<div class="multi-col-grid">`;
                let plain = `🎲 ${tbl.tableName} (${tbl.die} per column):\n`;

                for (let col of columns) {

                    const entry = tbl.entries.find(e => roll >= e.min && roll <= e.max);
                    let cellValue = "—";
                    let subResultHtml = "", subResultPlain = "";
                    if (!entry) {
                        cellValue = `[No match ${roll}]`;
                    } else {
                        if (isRegionalRace && entry.nextTable === "global_race_pool") {
                            const excluded = getExcludedRacesForColumn(tbl, col);
                            cellValue = rollFilteredGlobalPool(excluded);
                        } else {
                            cellValue = getColumnValue(entry, col);
                        }
                        if (entry.nextTable) {
                            const nextTables = entry.nextTable.split(',').map(s => s.trim());
                            for (let next of nextTables) {
                                let nestedPlain;
                                if (isRouterMaster(next)) {
                                    let num = (key == "situations_master_table" || key == "keyword_master_table" ? 3 : 1);
                                    nestedPlain = rollRouterMaster(next, num);
                                } else {
                                    const nextObj = getTable(next);
                                    if (nextObj && nextObj.rollType === "multi-column") {
                                        nestedPlain = rollMultiColumnPlain(next);
                                    } else {
                                        nestedPlain = rollStandardTable(next, 0, 0);
                                    }

                                subResultHtml += `<div style="margin-top:4px; font-size:0.85rem;">↳ ${escapeHtml(nestedPlain.replace(/\n/g, '<br>'))}</div>`;
                            }

                    plain += `  ${col} (${tbl.die} → ${roll}): ${cellValue}`;

                    plain += `\n`;

                html += `</div><div class="footnote" style="margin-top:8px">🎲 Column rolls: ${columnRolls.join(", ")}</div>`;

        let dieMax;
        if (tbl.rollType === "multi-column") {

            dieMax = getDieMax(tbl.die);
            if (dieMax <= 0) dieMax = 20;
        }
        let output = `📊 COVERAGE TEST for "${tbl.tableName}" (die: ${tbl.die}, max: ${dieMax})\n`;
        output += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;

                resultText = rollMultiColumnPlain(key, roll);
                const tempDiv = document.createElement('div');

            } else {
                resultText = rollStandardTable(key, 0, 0, roll);

            results.push(resultText);
            if (resultText.includes("[No entry]")) missing.push(roll);
        }
        if (missing.length === 0) output += `✅ SUCCESS: All ${dieMax} rolls have valid entries!\n\n`;
        else output += `❌ FAILURE: Missing entries for rolls: ${missing.join(", ")}\n\n`;
        output += `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;

        for (let i = 0; i < results.length; i++) {
            output += `Roll ${i+1}:\n${results[i]}\n\n`;
            if ((i+1) % 10 === 0 && i !== results.length-1) output += `───────────────────────────────────────────────────────────\n`;
        }
        document.getElementById('resultOutput').innerHTML = `<div class="test-output">${escapeHtml(output)}</div>`;
    }

        recentRow.style.display = 'flex';
        container.innerHTML = '';
        
        recentTables.forEach(tableKey => {
            const tableData = FULL_LIBRARY[tableKey];
            if (!tableData) return;

            const chip = document.createElement('div');
            chip.className = 'quick-chip';
            const name = tableData.tableName || "Unknown Table";
            chip.textContent = name.length > 22 ? name.substring(0, 20) + '...' : name;
            chip.onclick = () => quickRoll(tableKey);
            container.appendChild(chip);
        });
    }

    function addToRecents(tableKey) {
        // 1. Define your pinned keys exactly as they appear in your HTML
        const pinnedKeys = [
            'qa_table', 
            'a_npc_generator', 
            'situations_master_table', 
            'keyword_master_table'
        ];

        // 2. If the table you just rolled is pinned, STOP here.
        if (pinnedKeys.includes(tableKey)) return;

        // 3. Otherwise, proceed with history logic
        // Remove if already exists (to move it to the front)
        recentTables = recentTables.filter(key => key !== tableKey);
        
        // Add to start of array
        recentTables.unshift(tableKey);
        
        // Keep only last 10
        if (recentTables.length > 10) {
            recentTables.pop();
        }
        
        // Save to browser memory
        localStorage.setItem('recentTables', JSON.stringify(recentTables));
        
        // Refresh the UI
        renderRecentChips();
    }

    // 3. Update your existing selection logic
    // Find your previous selectFromMenu and quickRoll functions and update them:

    function selectFromMenu(val, name) {
        const select = document.getElementById('tableSelect');
        select.value = val;
        document.getElementById('currentTargetName').textContent = name;
        toggleMenu(); 
        updateInfoPanel();
        addToRecents(val); // <--- Add this
    }

    function quickRoll(tableKey) {
        const select = document.getElementById('tableSelect');
        if (!FULL_LIBRARY[tableKey]) return;
        
        select.value = tableKey;
        document.getElementById('currentTargetName').textContent = FULL_LIBRARY[tableKey].name;
        updateInfoPanel();
        performRoll();
        addToRecents(tableKey); // <--- Add this
    }

    // Initialize chips on page load
    window.addEventListener('DOMContentLoaded', renderRecentChips);

    // ================================
    // 6. HISTORY MANAGEMENT
    // ================================
    function addToHistory(tableName, resultText, dieInfo) {
        const timestamp = new Date().toLocaleTimeString();
        rollHistory.unshift({ time: timestamp, table: tableName, result: resultText, die: dieInfo });
        if (rollHistory.length > 50) rollHistory.pop();
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        if (!rollHistory.length) {
            container.innerHTML = '— No rolls yet —';
            return;
        }
        container.innerHTML = rollHistory.map(item => {
            // Convert newlines to <br> for proper line breaks in HTML
            let resultWithBreaks = item.result.replace(/\n/g, '<br>');
            return `<div class="history-item"><span style="color:#c9aa7b;">[${item.time}]</span> ${resultWithBreaks}</div>`;
        }).join('');
        document.getElementById('historyArea').scrollTop = 0;
    }

    // ================================
    // 7. RACE TABLE SPECIAL HANDLING
    // ================================
    // Get list of races that are already present in a column (excluding the global pool row)
    function getExcludedRacesForColumn(table, columnName) {
        const excluded = [];
        for (let entry of table.entries) {
            if (entry.min <= 95 && entry[columnName] && entry[columnName] !== "ROLL ON GLOBAL POOL") {
                excluded.push(entry[columnName]);
            }
        }
        return excluded;
    }

    // Roll on global_race_pool until we get a race NOT in the excluded list
    function rollFilteredGlobalPool(excludedRaces, maxAttempts = 20) {
        const globalTable = FULL_LIBRARY["global_race_pool"];
        if (!globalTable) return "[Missing global_race_pool]";
        const dieMax = parseInt(globalTable.die.slice(1), 10);
        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            const roll = Math.floor(Math.random() * dieMax) + 1;
            const entry = globalTable.entries.find(e => roll >= e.min && roll <= e.max);
            if (entry && entry.result && !excludedRaces.includes(entry.result)) return entry.result;
        }
        // Fallback: return first non-excluded or "Unknown"
        for (let entry of globalTable.entries) {
            if (entry.result && !excludedRaces.includes(entry.result)) return entry.result;
        }
        return "Exotic Race";
    }

    // ================================
    // 8. INITIALIZATION
    // ================================
    window.addEventListener('DOMContentLoaded', () => {
        populateSelect();
        document.getElementById('rollBtn').addEventListener('click', performRoll);
        document.getElementById('tableSelect').addEventListener('change', updateInfoPanel);
        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            rollHistory = [];
            renderHistory();
        });
        document.getElementById('testBtn').disabled = false;
        document.getElementById('testBtn').addEventListener('click', testTableCoverage);
    });

    // Safe initialization
    window.addEventListener('load', () => {
        // Small timeout ensures all HTML is definitely ready
        setTimeout(() => {
            const select = document.getElementById('tableSelect');
            const triggerText = document.getElementById('currentTargetName');
            const triggerBtn = document.getElementById('menuTrigger');

            if (select && select.options.length > 0 && select.selectedIndex !== -1) {
                if (triggerText) {
                    triggerText.textContent = select.options[select.selectedIndex].text;
                }
            }
            
            if (triggerBtn) triggerBtn.disabled = false;
            
            // Load the recents UI
            renderRecentChips();
        }, 100); 
    });

    // Quick Search Logic
    document.getElementById('tableSearch').addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        const select = document.getElementById('tableSelect');
        const optgroups = select.getElementsByTagName('optgroup');
        let firstVisible = null;

        for (let group of optgroups) {
            let hasVisibleOption = false;
            const options = group.getElementsByTagName('option');
            
            for (let opt of options) {
                const text = opt.textContent.toLowerCase();
                if (text.includes(searchTerm)) {
                    opt.style.display = ""; // Show
                    hasVisibleOption = true;
                    if (!firstVisible) firstVisible = opt;
                } else {
                    opt.style.display = "none"; // Hide
                }
            }
            
            // Hide the whole category if no tables match
            group.style.display = hasVisibleOption ? "" : "none";
        }

        // Auto-select the first result so you can just hit "Roll"
        if (firstVisible && searchTerm !== "") {
            select.value = firstVisible.value;
            updateInfoPanel();
        }
    });

    // Optional: Press "Enter" in search box to trigger the Roll button
    document.getElementById('tableSearch').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            performRoll();
        }
    });

    

    // ================================
    // 9. TESTER
    // ================================
    function findRouterTables() {
        const routerTables = [];
        for (const [key, table] of Object.entries(FULL_LIBRARY)) {
            // Only consider standard tables
            if (table.rollType !== "standard") continue;
            
            // Collect unique nextTable values from entries that have one
            const nextTables = [...new Set(table.entries.map(e => e.nextTable).filter(Boolean))];
            // Router must have exactly one unique nextTable
            if (nextTables.length !== 1) continue;
            
            const detail = FULL_LIBRARY[nextTables[0]];
            // Detail must exist and be multi-column
            if (detail && detail.rollType === "multi-column") {
                routerTables.push(key);
            }
        }
        return routerTables;
    }
</script>
</body>
